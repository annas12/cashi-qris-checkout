<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Gagal - Cashi QRIS Checkout</title>
    <meta name="description" content="Checkout Nutriflakes belum berhasil diproses.">
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Cashi QRIS Checkout">
        <span class="brand-mark">C</span>
        <span>Cashi QRIS Checkout</span>
      </a>
      <nav class="nav-links" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/checkout.html">Checkout</a>
      </nav>
    </header>

    <main class="status-page">
      <section class="status-box failed">
        <p class="eyebrow">Checkout Belum Berhasil</p>
        <h1>Pesanan belum dapat diproses.</h1>
        <p>
          Silakan cek kembali data pesanan atau coba lagi. Jika pembayaran QRIS sudah aktif,
          halaman ini dapat dipakai untuk status gagal, kedaluwarsa, atau dibatalkan.
        </p>
        <a class="button button-primary" href="/checkout.html">Coba Lagi</a>
      </section>
    </main>

    <script src="/js/app.js" defer></script>
  </body>
</html>
