<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pembayaran Berhasil - Cashi QRIS Checkout</title>
    <meta name="description" content="Konfirmasi pembayaran Nutriflakes yang sudah berhasil.">
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Cashi QRIS Checkout">
        <span class="brand-mark">C</span>
        <span>Cashi QRIS Checkout</span>
      </a>
      <nav class="nav-links" aria-label="Navigasi utama">
        <a href="/">Beranda</a>
        <a href="/checkout.html">Checkout</a>
      </nav>
    </header>

    <main class="status-page">
      <section class="status-box success" aria-labelledby="successTitle">
        <p class="eyebrow">Status Pembayaran</p>
        <h1 id="successTitle">Memeriksa pembayaran...</h1>
        <p id="successMessage" aria-live="polite">
          Mohon tunggu sebentar.
        </p>

        <div id="successDetails" class="success-details" hidden>
          <div class="status-detail">
            <span>Order ID</span>
            <strong id="successOrderId">-</strong>
          </div>
          <div class="status-detail">
            <span>Produk</span>
            <strong id="successProduct">-</strong>
          </div>
          <div class="status-detail">
            <span>Jumlah</span>
            <strong id="successQuantity">-</strong>
          </div>
          <div class="status-detail">
            <span>Nominal dibayar</span>
            <strong id="successAmount">-</strong>
          </div>
          <div class="status-detail">
            <span>Waktu pembayaran</span>
            <strong id="successPaidAt">-</strong>
          </div>
        </div>

        <a class="button button-primary" href="/">Kembali ke Halaman Utama</a>
      </section>
    </main>

    <script type="module" src="/js/success.js"></script>
  </body>
</html>
